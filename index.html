<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>SWANA Olympics 🏅</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:   #E63329;
      --blue:  #2B5BA8;
      --gold:  #F5A800;
      --green: #3DAA47;
      --white: #FFFFFF;
      --black: #111111;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--white);
      font-family: 'Nunito', sans-serif;
    }

    /* ═══ PARTICLE CANVAS (behind everything) ═══ */
    #canvas {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    /* ═══ FLAG BRUSH STROKES (z:2) ═══ */
    #flagSvg {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 2;
      overflow: visible;
    }

    /* Paint in from sides on load */
    .red-brush {
      animation:
        paintFromLeft 1.1s cubic-bezier(0.22,1,0.36,1) 0s both,
        stripeBreath  7s 1.4s ease-in-out infinite;
    }
    .blue-brush {
      animation:
        paintFromRight 1.1s cubic-bezier(0.22,1,0.36,1) 0.08s both,
        stripeBreath   7s 1.7s ease-in-out infinite;
    }

    @keyframes paintFromLeft  {
      from { clip-path: inset(0 100% 0 0); }
      to   { clip-path: inset(0 0%   0 0); }
    }
    @keyframes paintFromRight {
      from { clip-path: inset(0 0 0 100%); }
      to   { clip-path: inset(0 0 0 0%);   }
    }
    @keyframes stripeBreath {
      0%, 100% { opacity: 1;    }
      50%      { opacity: 0.82; }
    }

    /* ═══ CONTENT (z:10) ═══ */
    #content {
      position: fixed; inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(8px, 2vh, 18px) 16px;
      gap: clamp(4px, 1.2vh, 12px);
    }

    /* ─── RINGS ─── */
    /* Float wrapper: handles continuous up/down float */
    #ringsFloat {
      animation: floatUD 3.6s ease-in-out 1.7s infinite;
    }
    @keyframes floatUD {
      0%, 100% { transform: translateY(0);    }
      50%      { transform: translateY(-11px); }
    }

    /* SVG element: handles entrance */
    #rings {
      display: block;
      width: clamp(200px, 52vw, 340px);
      opacity: 0;
      transform: translateY(-55px) scale(0.85);
      animation: ringsEnter 0.8s cubic-bezier(0.22,1,0.36,1) 0.65s both;
    }
    @keyframes ringsEnter {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ─── TITLE BLOCK ─── */
    #titleBlock {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 680px;
      gap: 0;
    }

    /* Laurel wrappers: handle breathing */
    #lwLeft  { animation: lwLBreathe 4.5s ease-in-out 2.5s infinite; }
    #lwRight { animation: lwRBreathe 4.5s ease-in-out 2.7s infinite; }
    @keyframes lwLBreathe {
      0%, 100% { transform: scale(1) rotate(0deg);   }
      50%      { transform: scale(1.07) rotate(2deg); }
    }
    @keyframes lwRBreathe {
      0%, 100% { transform: scale(1) rotate(0deg);    }
      50%      { transform: scale(1.07) rotate(-2deg); }
    }

    /* Laurel SVGs: entrance animation */
    #laurelLeft, #laurelRight {
      flex-shrink: 0;
      width: clamp(60px, 13vw, 108px);
      opacity: 0;
    }
    #laurelLeft  {
      transform: scale(0.2) rotate(-25deg);
      animation: laurelLEnter 0.75s cubic-bezier(0.22,1,0.36,1) 1.25s both;
    }
    #laurelRight {
      transform: scale(0.2) rotate(25deg);
      animation: laurelREnter 0.75s cubic-bezier(0.22,1,0.36,1) 1.25s both;
    }
    @keyframes laurelLEnter {
      to { opacity: 1; transform: scale(1) rotate(0deg); }
    }
    @keyframes laurelREnter {
      to { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    /* Right laurel flips horizontally */
    #laurelRight svg { transform: scaleX(-1); display: block; }

    /* Title text */
    #titleText {
      flex: 1;
      text-align: center;
      min-width: 0;
    }

    .title-line {
      display: block;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(56px, 15.5vw, 126px);
      line-height: 0.89;
      color: var(--black);
      opacity: 0;
    }
    .title-line.swana {
      transform: translateX(-80px);
      animation: swanaEnter 0.6s cubic-bezier(0.22,1,0.36,1) 1.65s both;
    }
    .title-line.olympics {
      transform: translateX(80px);
      animation: olympicsEnter 0.6s cubic-bezier(0.22,1,0.36,1) 1.82s both;
    }
    @keyframes swanaEnter {
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes olympicsEnter {
      to { opacity: 1; transform: translateX(0); }
    }

    /* ─── DETAILS (green brush stroke) ─── */
    /* Float wrapper */
    #detailsFloat {
      animation: detailFloat 4.2s ease-in-out 2.8s infinite;
    }
    @keyframes detailFloat {
      0%, 100% { transform: translateY(0);   }
      50%      { transform: translateY(-7px); }
    }

    /* Sweep wrapper: entrance */
    #brushWrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: clamp(260px, 74vw, 510px);
      opacity: 0;
      transform-origin: left center;
      transform: scaleX(0);
      animation: brushSweep 0.8s cubic-bezier(0.22,1,0.36,1) 2.2s both;
    }
    @keyframes brushSweep {
      to { opacity: 1; transform: scaleX(1); }
    }

    .brush-svg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }
    #details {
      position: relative;
      z-index: 2;
      padding: clamp(14px, 3vw, 24px) clamp(30px, 7vw, 60px);
      text-align: center;
    }
    .detail-line {
      display: block;
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      color: var(--white);
      line-height: 1.25;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }
    .detail-date  { font-size: clamp(22px, 6vw, 38px); }
    .detail-time  { font-size: clamp(18px, 5vw, 30px); }
    .detail-venue { font-size: clamp(18px, 5vw, 30px); font-style: italic; }

    /* ─── INSTAGRAM CTA ─── */
    #ctaBtn {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      text-decoration: none;
      background: var(--black);
      color: var(--white);
      padding: clamp(12px,2.5vw,17px) clamp(24px,5vw,42px);
      border-radius: 60px;
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: clamp(13px,3.2vw,17px);
      letter-spacing: 0.3px;
      opacity: 0;
      transform: translateY(28px);
      animation: ctaEnter 0.65s cubic-bezier(0.22,1,0.36,1) 2.85s both,
                 ctaGlow  3s ease-in-out 3.8s infinite;
      box-shadow: 0 4px 22px rgba(0,0,0,0.22);
    }
    @keyframes ctaEnter {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes ctaGlow {
      0%, 100% { box-shadow: 0 4px 22px rgba(0,0,0,0.22); }
      50%       { box-shadow: 0 4px 32px rgba(0,0,0,0.35), 0 0 0 5px rgba(245,168,0,0.25); }
    }
    #ctaBtn:active { transform: scale(0.96); }

    .cta-top {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ig-icon {
      width: 20px; height: 20px;
      flex-shrink: 0;
    }
    .cta-sub {
      font-size: clamp(10px, 2.2vw, 13px);
      font-weight: 700;
      opacity: 0.7;
      letter-spacing: 0.5px;
    }

    /* ─── SOUND BUTTON ─── */
    #soundBtn {
      position: fixed;
      bottom: 18px; right: 18px;
      z-index: 50;
      width: 44px; height: 44px;
      background: rgba(255,255,255,0.92);
      border: 2px solid rgba(0,0,0,0.12);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      backdrop-filter: blur(8px);
      opacity: 0;
      transform: scale(0.5);
      animation: soundPop 0.5s cubic-bezier(0.22,1,0.36,1) 3s both;
      transition: background 0.2s, transform 0.15s ease;
    }
    @keyframes soundPop {
      to { opacity: 1; transform: scale(1); }
    }
    #soundBtn:hover  { background: #fff; transform: scale(1.12); }
    #soundBtn:active { transform: scale(0.9); }
    #soundBtn.off    { opacity: 0.45; }
  </style>
</head>
<body>

<!-- ── AUDIO ── -->
<!-- Starts at 12s to skip quiet intro -->
<audio id="bgAudio" src="wavin-flag.mp3" preload="auto"></audio>

<!-- ── PARTICLES ── -->
<canvas id="canvas"></canvas>

<!-- ── FLAG BRUSH STROKES ── -->
<!-- Strokes paint in from left/right on page load -->
<svg id="flagSvg" viewBox="0 0 100 100" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Red brush stroke (left ~30%), wavy right edge -->
  <path class="red-brush" fill="#E63329" d="
    M 0,0
    L 31,0
    Q 28,4  33,9
    Q 29,14 32,20
    Q 27,26 31,32
    Q 35,38 29,44
    Q 32,50 28,56
    Q 33,62 29,68
    Q 27,74 32,80
    Q 29,86 33,92
    Q 30,96 31,100
    L 0,100 Z
  "/>
  <!-- Blue brush stroke (right ~30%), wavy left edge -->
  <path class="blue-brush" fill="#2B5BA8" d="
    M 100,0
    L 69,0
    Q 72,4  67,9
    Q 71,14 68,20
    Q 73,26 69,32
    Q 65,38 71,44
    Q 68,50 72,56
    Q 67,62 71,68
    Q 73,74 68,80
    Q 71,86 67,92
    Q 70,96 69,100
    L 100,100 Z
  "/>
</svg>

<!-- ── CONTENT ── -->
<div id="content">

  <!-- Olympic Rings: float wrapper + SVG that enters -->
  <div id="ringsFloat">
    <svg id="rings" viewBox="4 4 332 112" xmlns="http://www.w3.org/2000/svg">
      <!-- All 5 rings base -->
      <circle cx="50"  cy="60" r="42" fill="none" stroke="#0085C7" stroke-width="11"/>
      <circle cx="110" cy="60" r="42" fill="none" stroke="#F4C300" stroke-width="11"/>
      <circle cx="170" cy="60" r="42" fill="none" stroke="#000"    stroke-width="11"/>
      <circle cx="230" cy="60" r="42" fill="none" stroke="#009F6B" stroke-width="11"/>
      <circle cx="290" cy="60" r="42" fill="none" stroke="#DF0024" stroke-width="11"/>
      <!-- Interlocking arcs: rings 1,3,5 pass over 2,4 at intersection -->
      <circle cx="50"  cy="60" r="42" fill="none" stroke="#0085C7" stroke-width="11"
        stroke-dasharray="55 210" stroke-dashoffset="-72"/>
      <circle cx="170" cy="60" r="42" fill="none" stroke="#000"    stroke-width="11"
        stroke-dasharray="55 210" stroke-dashoffset="-72"/>
      <circle cx="290" cy="60" r="42" fill="none" stroke="#DF0024" stroke-width="11"
        stroke-dasharray="55 210" stroke-dashoffset="-72"/>
    </svg>
  </div>

  <!-- Title Block: Laurel | Text | Laurel -->
  <div id="titleBlock">

    <!-- Left laurel: breathe wrapper + entering SVG -->
    <div id="lwLeft">
      <svg id="laurelLeft" viewBox="0 0 90 200" xmlns="http://www.w3.org/2000/svg">
        <path d="M44,196 Q37,155 29,112 Q23,68 37,14"
          stroke="#C8890A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <g fill="#F5A800">
          <ellipse cx="33" cy="184" rx="9"  ry="17" transform="rotate(0,33,184)"/>
          <ellipse cx="24" cy="168" rx="9"  ry="16" transform="rotate(-13,24,168)"/>
          <ellipse cx="18" cy="151" rx="8"  ry="15" transform="rotate(-26,18,151)"/>
          <ellipse cx="14" cy="133" rx="8"  ry="14" transform="rotate(-39,14,133)"/>
          <ellipse cx="12" cy="114" rx="7"  ry="13" transform="rotate(-52,12,114)"/>
          <ellipse cx="14" cy="96"  rx="7"  ry="12" transform="rotate(-64,14,96)"/>
          <ellipse cx="19" cy="78"  rx="6"  ry="11" transform="rotate(-77,19,78)"/>
          <ellipse cx="27" cy="62"  rx="6"  ry="10" transform="rotate(-89,27,62)"/>
          <ellipse cx="38" cy="48"  rx="5"  ry="9"  transform="rotate(-102,38,48)"/>
          <ellipse cx="51" cy="36"  rx="5"  ry="8"  transform="rotate(-115,51,36)"/>
          <ellipse cx="65" cy="25"  rx="4"  ry="7"  transform="rotate(-127,65,25)"/>
        </g>
      </svg>
    </div>

    <!-- Title text -->
    <div id="titleText">
      <span class="title-line swana">SWANA</span>
      <span class="title-line olympics">OLYMPICS</span>
    </div>

    <!-- Right laurel: breathe wrapper + entering SVG (mirrored) -->
    <div id="lwRight">
      <svg id="laurelRight" viewBox="0 0 90 200" xmlns="http://www.w3.org/2000/svg">
        <path d="M44,196 Q37,155 29,112 Q23,68 37,14"
          stroke="#C8890A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <g fill="#F5A800">
          <ellipse cx="33" cy="184" rx="9"  ry="17" transform="rotate(0,33,184)"/>
          <ellipse cx="24" cy="168" rx="9"  ry="16" transform="rotate(-13,24,168)"/>
          <ellipse cx="18" cy="151" rx="8"  ry="15" transform="rotate(-26,18,151)"/>
          <ellipse cx="14" cy="133" rx="8"  ry="14" transform="rotate(-39,14,133)"/>
          <ellipse cx="12" cy="114" rx="7"  ry="13" transform="rotate(-52,12,114)"/>
          <ellipse cx="14" cy="96"  rx="7"  ry="12" transform="rotate(-64,14,96)"/>
          <ellipse cx="19" cy="78"  rx="6"  ry="11" transform="rotate(-77,19,78)"/>
          <ellipse cx="27" cy="62"  rx="6"  ry="10" transform="rotate(-89,27,62)"/>
          <ellipse cx="38" cy="48"  rx="5"  ry="9"  transform="rotate(-102,38,48)"/>
          <ellipse cx="51" cy="36"  rx="5"  ry="8"  transform="rotate(-115,51,36)"/>
          <ellipse cx="65" cy="25"  rx="4"  ry="7"  transform="rotate(-127,65,25)"/>
        </g>
      </svg>
    </div>

  </div><!-- /titleBlock -->

  <!-- Details: float wrapper + brush stroke that sweeps in -->
  <div id="detailsFloat">
    <div id="brushWrap">
      <svg class="brush-svg" viewBox="0 0 500 160" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="
          M 8,38 Q 35,8 72,20
          L 428,6 Q 465,4 492,32
          L 490,122 Q 486,150 450,140
          L 56,148 Q 26,150 6,124 Z
        " fill="#3DAA47" opacity="0.94"/>
        <path d="
          M 24,60 Q 58,52 98,58
          L 402,46 Q 438,44 462,56
          L 460,82 Q 425,74 388,76
          L 100,86 Q 62,88 26,78 Z
        " fill="#4EC055" opacity="0.28"/>
      </svg>
      <div id="details">
        <span class="detail-line detail-date">04 / 23 / 26</span>
        <span class="detail-line detail-time">4 PM – 7 PM</span>
        <span class="detail-line detail-venue">The Lawn</span>
      </div>
    </div>
  </div>

  <!-- Instagram CTA -->
  <!-- ↓ UPDATE: replace YOUR_INSTAGRAM_HANDLE with actual handle -->
  <a id="ctaBtn" href="https://instagram.com/YOUR_INSTAGRAM_HANDLE" target="_blank" rel="noopener">
    <div class="cta-top">
      <!-- Instagram icon -->
      <svg class="ig-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="20" height="20" rx="6" stroke="white" stroke-width="2"/>
        <circle cx="12" cy="12" r="5" stroke="white" stroke-width="2"/>
        <circle cx="17.5" cy="6.5" r="1.5" fill="white"/>
      </svg>
      Follow us on Instagram
    </div>
    <span class="cta-sub">Stay updated on all things SWANA Olympics</span>
  </a>

</div><!-- /content -->

<!-- Sound toggle (appears after animations complete) -->
<button id="soundBtn" title="Toggle sound">🔊</button>

<script>
  /* ─── AUDIO ─── */
  const audio = document.getElementById('bgAudio');
  const soundBtn = document.getElementById('soundBtn');
  let audioStarted = false;
  let muted = false;

  function startAudio() {
    if (audioStarted) return;
    audioStarted = true;
    audio.currentTime = 12;
    audio.volume = 0.85;
    audio.play().catch(() => {});
  }

  // Start audio on first tap anywhere on page
  document.addEventListener('pointerdown', startAudio, { once: true });

  soundBtn.addEventListener('click', e => {
    e.stopPropagation();
    if (!audioStarted) {
      startAudio();
    } else {
      muted = !muted;
      audio.muted = muted;
    }
    soundBtn.textContent = muted ? '🔇' : '🔊';
    soundBtn.classList.toggle('off', muted);
  });

  /* ─── PARTICLES (floating Olympic ring circles) ─── */
  const canvas  = document.getElementById('canvas');
  const ctx     = canvas.getContext('2d');
  const COLORS  = ['#0085C7','#F4C300','#000000','#009F6B','#DF0024','#E63329','#F5A800'];
  let pts = [];

  function resizeCanvas() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', () => { resizeCanvas(); initPts(); });

  function initPts() {
    pts = [];
    const count = Math.round(window.innerWidth / 45);
    for (let i = 0; i < count; i++) {
      pts.push(makePt(true));
    }
  }

  function makePt(randomY = false) {
    return {
      x:     Math.random() * canvas.width,
      y:     randomY
               ? Math.random() * canvas.height
               : canvas.height + 20,
      r:     Math.random() * 7 + 4,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      speed: Math.random() * 0.55 + 0.2,
      drift: (Math.random() - 0.5) * 0.45,
      alpha: Math.random() * 0.28 + 0.08,
      lw:    Math.random() * 1.5 + 1.2,
    };
  }
  initPts();

  function tickPts() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < pts.length; i++) {
      const p = pts[i];
      p.y -= p.speed;
      p.x += p.drift;
      if (p.y + p.r < 0) pts[i] = makePt(false);
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.strokeStyle = p.color;
      ctx.lineWidth   = p.lw;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
    requestAnimationFrame(tickPts);
  }
  tickPts();
</script>

</body>
</html>
